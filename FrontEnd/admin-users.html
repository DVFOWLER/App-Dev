<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Users - Admin Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="script.js" defer></script>
</head>
<body class="admin-page">
<header class="main-header">
  <div class="logo">🎣 <span>ADMIN PANEL</span></div>
  <nav class="nav-links">
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="admin-products.html">Products</a>
    <a href="admin-users.html" aria-current="page">Users</a>
    <a href="admin-orders.html">Orders</a>
  </nav>
  <div class="auth-right">
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">
  <h1 style="color:#333; margin-bottom:30px;">User Management</h1>

  <div style="background:white; padding:30px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1); margin-bottom:40px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h2 style="color:#333;">Registered Accounts</h2>
      <span style="background:#f3f4f6; padding:5px 15px; border-radius:20px; font-size:0.9rem;">
        Total Users: <strong id="user-count-badge">0</strong>
      </span>
    </div>

    <table>
      <thead>
        <tr>
          <th>Username</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="users-tbody">
        </tbody>
    </table>
  </div>
</div>

<footer>
  <p class="copyright">© 2026 TackleNearMe - Admin System Control</p>
</footer>
</body>
</html>
