<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - TackleNearMe</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="script.js" defer></script>
</head>
<body class="admin-page">
<header class="main-header">
  <div class="logo">🎣 <span>ADMIN PANEL</span></div>
  <nav class="nav-links">
    <a href="admin-dashboard.html" aria-current="page">Dashboard</a>
    <a href="admin-products.html">All Products</a> <a href="admin-users.html">Manage Users</a>
    <a href="admin-orders.html">Transactions</a>
  </nav>
  <div class="auth-right">
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">
  <h1 style="color:#333; margin-top:20px;">System Overview</h1>

  <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; margin:30px 0;">
    <div class="stat"><h3>Total Transactions</h3><p id="stat-orders">0</p></div>
    <div class="stat pink"><h3>Total Revenue</h3><p id="stat-revenue">₱0</p></div>
    <div class="stat blue"><h3>Registered Users</h3><p id="stat-users">0</p></div>
    <div class="stat green"><h3>Live Listings</h3><p id="stat-products">0</p></div>
  </div>

  <div style="background:white; padding:30px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1); margin-bottom:40px;">
    <h2 style="color:#333; margin-bottom:20px;">Recent Global Transactions</h2>
    <table>
      <thead>
        <tr><th>Order ID</th><th>Customer</th><th>Amount</th><th>Status</th></tr>
      </thead>
      <tbody id="recent-orders"></tbody>
    </table>
  </div>
</div>

<script>
  // Simple dashboard counts
  document.addEventListener('DOMContentLoaded', () => {
    const orders = JSON.parse(localStorage.getItem('orders') || '[]');
    const products = JSON.parse(localStorage.getItem('products') || '[]');
    const users = JSON.parse(localStorage.getItem('users') || '[]'); // Assuming you store a user list
    
    if(document.getElementById('stat-orders')) document.getElementById('stat-orders').textContent = orders.length;
    if(document.getElementById('stat-products')) document.getElementById('stat-products').textContent = products.length;
    if(document.getElementById('stat-users')) document.getElementById('stat-users').textContent = users.length || '3'; 

    const revenue = orders.reduce((sum, o) => sum + Number(o.amount), 0);
    if(document.getElementById('stat-revenue')) document.getElementById('stat-revenue').textContent = '₱' + revenue.toLocaleString();
  });
</script>
</body>
</html>
