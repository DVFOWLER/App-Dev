<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Products - Admin Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="script.js" defer></script>
</head>
<body class="admin-page">
<header class="main-header">
  <div class="logo">🎣 <span>ADMIN PANEL</span></div>
  <nav class="nav-links">
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="admin-products.html" aria-current="page">Products</a>
    <a href="admin-users.html">Users</a>
    <a href="admin-orders.html">Orders</a>
  </nav>
  <div class="auth-right">
    <span class="user-info" id="user-greeting" style="display:none;"><span id="username-display"></span></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">
  <h1 style="color:#333; margin-bottom:30px;">Manage Products</h1>

  <div style="background:white; padding:30px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1); margin-bottom:40px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h2 style="color:#333;">Products List</h2>
      <button id="btn-add-product" class="btn" style="background:linear-gradient(90deg, #ff7eb3, #ff758c);">+ Add Product</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Product Name</th><th>Price</th><th>Stock</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="products-tbody"></tbody>
    </table>
  </div>
</div>

<footer>
  <div class="footer-container">
    <div>
      <h3>🎣 Admin Panel</h3>
      <p>Manage your TackleNearMe shop</p>
    </div>
    <div>
      <h4>Quick Links</h4>
      <a href="admin-dashboard.html">Dashboard</a>

    </div>
    <div>
      <h4>Follow Us</h4>
      <a href="https://www.facebook.com/Hookpointtackleshop" target="_blank" rel="noopener">Facebook</a>

    </div>

</footer>
